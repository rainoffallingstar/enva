name: xdxtools-core
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core Python
  - python=3.8.18
  - numpy=1.24.4
  - pandas

  # QC Tools
  - fastqc
  - multiqc=1.19
  - seqkit
  - seqtk
  - qualimap

  # Methylation Analysis
  - bismark
  - trim-galore
  - samtools=1.15.1
  - hdf5

  # RNA-seq Analysis
  - star
  - htseq=2.0.3
  - rmats=4.1.2

  # General Bioinformatics
  - picard

  # ChIP-seq/ATAC-seq Core Tools
  - macs2=2.2.7.1         # Pin to a Python 3.8-compatible build
  - bwa=0.7.17            # Alignment for ChIP-seq
  - bowtie2=2.5.4         # Alternative alignment for ChIP-seq

  # Workflow Utilities
  - pyyaml
